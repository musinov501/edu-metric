# Render Blueprint — API + Postgres (free tier). One-click from Render dashboard.
# After deploy: copy the API URL into Vercel/Netlify as NEXT_PUBLIC_API_URL.

databases:
  - name: edumetric-db
    plan: free
    databaseName: edumetric
    user: edumetric

services:
  - type: web
    name: edumetric-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: >-
      npm install --include=dev &&
      npm run db:generate &&
      npm run build -w apps/api &&
      npx prisma db push --schema=apps/api/prisma/schema.prisma --skip-generate &&
      npm run db:seed
    startCommand: NODE_ENV=production npm run start:prod -w apps/api
    healthCheckPath: /api/v1/health
    envVars:
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: edumetric-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: AI_PROVIDER
        value: openai
